<!DOCTYPE html>
<html lang="en">
<head>
    <!-- All your existing head content stays the same -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - EyeCare Clinic</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- [Keep all your existing styles exactly the same] -->
</head>
<body>
    <!-- [Keep your existing Header, Hero, Form HTML exactly the same] -->

    <!-- Form Section (updated button styling for WhatsApp) -->
    <section class="section">
        <div class="container">
            <div class="form-container" id="formContainer">
                <!-- Your existing form fields stay EXACTLY the same -->
                <form id="appointmentForm">
                    <!-- Row 1: Full Name & Phone -->
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                        <div class="form-group">
                            <label for="fullName"><i class="fas fa-user"></i> Full Name <span style="color: #ef4444;">*</span></label>
                            <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
                        </div>
                        <div class="form-group">
                            <label for="phone"><i class="fas fa-phone"></i> Phone Number <span style="color: #ef4444;">*</span></label>
                            <input type="tel" id="phone" name="phone" placeholder="9289546303" required>
                        </div>
                    </div>

                    <!-- Rest of your form fields stay the same -->
                    <!-- [Email, Age, Service Type, Problem Description] -->

                    <!-- WHATSAPP SUBMIT BUTTON -->
                    <button type="submit" class="submit-btn" id="submitBtn" style="
                        background: linear-gradient(135deg, #25D366, #128C7E) !important;
                        box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
                    ">
                        <i class="fab fa-whatsapp"></i> Send to WhatsApp (9289546303)
                    </button>
                </form>
            </div>

            <!-- Success Message -->
            <div id="successMessage" class="success-message" style="display: none; max-width: 700px; margin: 0 auto;">
                <i class="fas fa-check-circle" style="font-size: 5rem; color: white; margin-bottom: 2rem;"></i>
                <h3 style="font-size: 2.2rem; margin-bottom: 1rem;">✅ WhatsApp Ready!</h3>
                <p style="font-size: 1.3rem; margin-bottom: 1.5rem;">
                    Click below to send your appointment request to:<br>
                    <strong style="font-size: 1.5rem;">📱 9289546303</strong>
                </p>
                <a href="#" id="whatsappLink" class="whatsapp-btn" target="_blank">
                    <i class="fab fa-whatsapp"></i> Open WhatsApp Chat
                </a>
            </div>
        </div>
    </section>

    <!-- COMPLETE JAVASCRIPT WITH YOUR NUMBER 9289546303 -->
    <script>
        document.getElementById('appointmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Show loading
            const loadingOverlay = document.getElementById('loadingOverlay');
            const submitBtn = document.getElementById('submitBtn');
            loadingOverlay.style.display = 'flex';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Preparing WhatsApp...';
            
            // Get all form data
            const fullName = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email')?.value || 'Not provided';
            const age = document.getElementById('age')?.value || 'Not provided';
            const serviceType = document.getElementById('serviceType')?.value || 'Not specified';
            const problem = document.getElementById('problem').value;
            
            // ✅ YOUR WHATSAPP NUMBER: 9289546303
            const clinicWhatsAppNumber = '9289546303';
            
            // Professional WhatsApp message format
            const message = `🩺 *EYE CARE APPOINTMENT REQUEST* 🩺

👤 *Patient Name:* ${fullName}
📱 *Contact Number:* ${phone}
📧 *Email:* ${email}
🎂 *Age:* ${age}
🏥 *Service Required:* ${serviceType}

🔍 *Eye Problem Description:*
${problem}

⏰ *Please call patient ASAP to schedule appointment*

---
*EyeCare Clinic Auto-Request*`;

            // Encode for WhatsApp URL
            const encodedMessage = encodeURIComponent(message);
            const whatsappURL = `https://wa.me/${clinicWhatsAppNumber}?text=${encodedMessage}`;
            
            // Show success after 2 seconds
            setTimeout(() => {
                loadingOverlay.style.display = 'none';
                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('whatsappLink').href = whatsappURL;
                
                // Auto-open WhatsApp
                window.open(whatsappURL, '_blank');
            }, 2000);
        });

        // Mobile menu functionality
        document.querySelector('.mobile-menu').addEventListener('click', () => {
            document.querySelector('.nav-links').classList.toggle('active');
        });
    </script>

    <!-- [Keep your existing footer with updated WhatsApp number] -->
    <footer>
        <!-- ... existing footer content ... -->
        <div class="footer-section">
            <h3>Contact</h3>
            <p><i class="fas fa-whatsapp" style="color: #25D366;"></i><br><strong>WhatsApp: 9289546303</strong></p>
            <p><i class="fas fa-phone"></i><br>+91 9289546303</p>
        </div>
    </footer>
</body>
</html>
