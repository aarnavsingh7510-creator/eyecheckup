<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial;
            background: #f5f7fb;
            margin: 0;
        }

        .container {
            max-width: 700px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Book Appointment</h2>

    <form id="appointmentForm">

        <input type="text" id="fullName" placeholder="Full Name" required>

        <input type="tel" id="phone" placeholder="Phone Number" required>

        <input type="email" id="email" placeholder="Email">

        <input type="number" id="age" placeholder="Age">

        <input type="file" id="prescriptionFile">

        <textarea id="problem" placeholder="Describe your problem..." required></textarea>

        <select id="serviceType">
            <option value="">Select Service</option>
            <option>Eye Checkup</option>
            <option>Glasses</option>
            <option>LASIK</option>
        </select>

        <button type="submit" id="submitBtn">
            Submit Appointment Request
        </button>

    </form>
</div>

<script>
document.getElementById('appointmentForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const btn = document.getElementById('submitBtn');

    const fullName = document.getElementById('fullName').value;
    const phone = document.getElementById('phone').value;
    const email = document.getElementById('email').value || 'Not provided';
    const age = document.getElementById('age').value || 'Not provided';
    const problem = document.getElementById('problem').value;
    const service = document.getElementById('serviceType').value || 'Not specified';

    const file = document.getElementById('prescriptionFile').files[0];
    const fileName = file ? file.name : "No file";

    const message = `📅 *New Appointment Request*%0A
👤 Name: ${fullName}%0A
📞 Phone: ${phone}%0A
📧 Email: ${email}%0A
🎂 Age: ${age}%0A
📄 File: ${fileName}%0A
🩺 Service: ${service}%0A
📝 Problem: ${problem}`;

    // 🔴 PUT YOUR NUMBER HERE
    const whatsappNumber = "919876543210";

    const url = `https://wa.me/${whatsappNumber}?text=${message}`;

    btn.innerText = "Redirecting...";

    alert("✅ Form submitted!\nClick OK to open WhatsApp.");

    window.open(url, "_blank");

    setTimeout(() => {
        btn.innerText = "Submit Appointment Request";
    }, 2000);
});
</script>

</body>
</html>
